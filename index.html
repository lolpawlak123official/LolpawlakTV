<!DOCTYPE html>
<html>
<head>
  <title>Lolpawlak TV</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 16px;
      background: #202020;
    }

    .logo {
      color: #3ea6ff;
      font-weight: bold;
      font-size: 18px;
    }

    .search {
      flex: 1;
      display: flex;
    }

    .search input {
      width: 100%;
      padding: 8px;
      background: #121212;
      border: 1px solid #333;
      color: white;
      border-radius: 3px 0 0 3px;
    }

    .search button {
      padding: 8px 12px;
      background: #3ea6ff;
      border: none;
      color: white;
      cursor: pointer;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 180px;
      background: #181818;
      min-height: calc(100vh - 48px);
      padding: 10px;
    }

    .sidebar div {
      padding: 10px;
      cursor: pointer;
    }

    .sidebar div:hover {
      background: #2a2a2a;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      border-radius: 10px;
    }

    #player {
      display: none;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      background: #3ea6ff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        display: flex;
        justify-content: space-around;
      }

      .main {
        padding: 10px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">Lolpawlak TV</div>

  <div class="search">
    <input type="text" id="searchInput" placeholder="Search">
    <button onclick="search()">Search</button>
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="goHome()">Home</div>
    <div onclick="playPlaylist()">Playlist</div>
  </div>

  <div class="main">

    <div id="player">
      <iframe id="ytPlayer" allowfullscreen></iframe>
      <h2 id="videoTitle"></h2>
      <button onclick="goBack()">Back</button>
    </div>

    <div id="home">
      <div class="grid" id="videos"></div>
    </div>

  </div>

</div>

<script>
const videoIds = [
"IVAGhBVnD24","iA4gAnl4tVs","_nq1zs6KlJg","V88_lZRwP70",
"CdznP_fjNWk","kDhUg90HbZ0","dV4p7D3yBRo","bLX1-7J4a7s",
"RauQTut4QDo","xKCuG6HWaRQ","j6dKka5ubKg","5B3gK71u68E",
"EH_b9y5kvW4","y72ZTS1Z73Q","g_VKRP7Z0WE","tLPAipwUpZU",
"QhDj3C4nC8M","F479uTKAlbg"
];

let allVideos = [];
const container = document.getElementById("videos");

// LOAD TITLES
videoIds.forEach(id => {
  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
    .then(res => res.json())
    .then(data => {
      const vid = { id: id, title: data.title };
      allVideos.push(vid);
      createCard(vid);
    })
    .catch(() => {
      const vid = { id: id, title: "Unavailable Video" };
      allVideos.push(vid);
      createCard(vid);
    });
});

function createCard(video) {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg">
    <div class="title">${video.title}</div>
  `;

  card.onclick = () => playVideo(video.id, video.title);

  container.appendChild(card);
}

function playVideo(id, title) {
  document.getElementById("home").style.display = "none";
  document.getElementById("player").style.display = "block";

  document.getElementById("ytPlayer").src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

  document.getElementById("videoTitle").innerText = title;

  // AUTOPLAY NEXT
  const index = allVideos.findIndex(v => v.id === id);
  const next = allVideos[index + 1];

  if (next) {
    setTimeout(() => {
      playVideo(next.id, next.title);
    }, 15000); // plays next after 15s
  }
}

function goBack() {
  document.getElementById("player").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("ytPlayer").src = "";
}

function goHome() {
  goBack();
}

// SEARCH
function search() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  container.innerHTML = "";

  allVideos
    .filter(v => v.title.toLowerCase().includes(query))
    .forEach(createCard);
}

// PLAYLIST
function playPlaylist() {
  document.getElementById("home").style.display = "none";
  document.getElementById("player").style.display = "block";

  document.getElementById("ytPlayer").src =
    "https://www.youtube.com/embed/videoseries?list=PLPfn50bvpCA8p0NnC_v0a_abfgK4CNjBe&autoplay=1";

  document.getElementById("videoTitle").innerText = "Playlist";
}
</script>

</body>
</html>
