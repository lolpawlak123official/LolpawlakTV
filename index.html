<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lolpawlak TV</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}


/* TOP BAR */

.topbar {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px 16px;
  background: #202020;
}


.logo {
  color: #3ea6ff;
  font-weight: bold;
  font-size: 20px;
}


.search {
  flex: 1;
  display: flex;
}


.search input {
  width: 100%;
  padding: 9px;
  background: #121212;
  border: 1px solid #333;
  color: white;
}


.search button {
  background: #3ea6ff;
  color: white;
  border: none;
  padding: 9px 15px;
  cursor: pointer;
}


/* MAIN */

.main {
  width: 100%;
  padding: 20px;
}



/* GRID */

.grid {

  display: grid;

  grid-template-columns:
  repeat(auto-fill,minmax(260px,1fr));

  gap: 18px;

}


.card {

  cursor: pointer;

  transition: transform .2s;

}


.card:hover {

  transform: scale(1.03);

}



.card img {

  width:100%;

  border-radius:10px;

}



.title {

  margin-top:8px;

  font-weight:bold;

  font-size:14px;

}



/* PLAYER */


#player {

  display:none;

}


iframe {

  width:100%;

  aspect-ratio:16/9;

  border:none;

  border-radius:10px;

}



button {

  margin-top:10px;

  padding:8px 14px;

  background:#3ea6ff;

  color:white;

  border:none;

  border-radius:5px;

}



/* MOBILE */

@media(max-width:768px){

.topbar {

  flex-direction:column;

  align-items:stretch;

}


.logo {

  text-align:center;

}


.main {

  padding:10px;

}


.grid {

  grid-template-columns:
  repeat(2,minmax(0,1fr));

  gap:10px;

}


.title {

  font-size:12px;

}

}



@media(max-width:400px){

.grid {

  grid-template-columns:1fr;

}

}


</style>

</head>


<body>


<div class="topbar">

<div class="logo">
Lolpawlak TV
</div>


<div class="search">

<input id="searchInput" placeholder="Search">

<button onclick="search()">
Search
</button>

</div>

</div>




<div class="main">


<div id="player">

<iframe id="ytPlayer" allowfullscreen></iframe>

<h2 id="videoTitle"></h2>

<button onclick="goBack()">
Back
</button>

</div>



<div id="home">

<div class="grid" id="videos"></div>

</div>


</div>





<script>


const videoIds = [

"IVAGhBVnD24",
"iA4gAnl4tVs",
"_nq1zs6KlJg",

"CdznP_fjNWk",

"dV4p7D3yBRo",
"bLX1-7J4a7s",
"RauQTut4QDo",
"xKCuG6HWaRQ",
"j6dKka5ubKg",
"5B3gK71u68E",
"EH_b9y5kvW4",
"y72ZTS1Z73Q",
"g_VKRP7Z0WE",
"tLPAipwUpZU",
"QhDj3C4nC8M",

"fcTWUiivxrA",
"n4rTgJvHVnE",
"c6sfVuYah1A",
"4owj7m1yuMc",
"StoOclRf8U8",
"Eez7qWEQ2Ww",
"N_RECvmrirI",
"--CCDbmPBdY",
"FOHdMiHSNYY",
"-Zg_4hJB1O4",
"b_FIs_eyyVY"
"zToRBWtcSPU",
"EVnMa7ucU_Q",
"Yojc4RJxwCw",
"QuIZTckh5hE",
"edSN0G_JgvA",
"iwnmT-bWklc",
"VJGhdyqUJvw",
"X_uNLrPg-sA"
  
];



// RANDOMIZE ORDER

videoIds.sort(() => Math.random() - 0.5);



let allVideos = [];

const container =
document.getElementById("videos");





videoIds.forEach((id,index)=>{


let video = {

id:id,

title:"Video " + (index + 1)

};



allVideos.push(video);

createCard(video);



fetch(
`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`
)


.then(res=>res.json())


.then(data=>{


video.title=data.title;

refreshCards();


})

.catch(()=>{});


});






function createCard(video){


let card=document.createElement("div");


card.className="card";



card.innerHTML=`

<img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg">

<div class="title">
${video.title}
</div>

`;



card.onclick=()=>playVideo(video.id,video.title);



container.appendChild(card);


}





function refreshCards(){


container.innerHTML="";


allVideos.forEach(createCard);


}





function playVideo(id,title){


document.getElementById("home").style.display="none";


document.getElementById("player").style.display="block";


document.getElementById("ytPlayer").src=

"https://www.youtube.com/embed/"+id+"?autoplay=1";



document.getElementById("videoTitle").innerText=title;


}





function goBack(){


document.getElementById("player").style.display="none";


document.getElementById("home").style.display="block";


document.getElementById("ytPlayer").src="";


}





function search(){


let query =
document.getElementById("searchInput").value.toLowerCase();



container.innerHTML="";



allVideos

.filter(video=>

video.title.toLowerCase().includes(query)

)

.forEach(createCard);


}


</script>


</body>
</html>
